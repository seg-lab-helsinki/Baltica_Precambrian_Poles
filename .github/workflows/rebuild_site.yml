name: Rebuild Baltica figures

on:
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/rebuild_site.yml"

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate paleolatitude table and figure
  continue-on-error: true
  run: |
    python scripts/calculate_paleolatitude_and_plot.py

      - name: Generate site-level example plots
        run: |
          python scripts/make_site_level_example_plots.py

      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto rebuild Baltica figures"
          file_pattern: "data/Baltica_paleolatitudes_64N_28E.* figures/**/*.png pages/*.html"
